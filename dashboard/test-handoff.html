<!DOCTYPE html>
<html>
<head><title>Test Handoff</title></head>
<body>
<h1>Test Handoff API</h1>
<button onclick="testAPI()">Test API Call</button>
<pre id="output"></pre>
<script>
async function testAPI() {
    const output = document.getElementById('output');
    output.textContent = 'Testing...';
    
    try {
        const response = await fetch('/api/create-handoff-page', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                projectId: '1267927224',
                projectTitle: 'Test Project',
                formData: {
                    clientName: 'Test Client',
                    hostingType: 'SaaS'
                }
            })
        });
        
        output.textContent = `Status: ${response.status}\n`;
        output.textContent += `Status Text: ${response.statusText}\n\n`;
        
        const text = await response.text();
        output.textContent += `Response: ${text}`;
        
    } catch (error) {
        output.textContent = `Error: ${error.message}\n${error.stack}`;
    }
}
</script>
</body>
</html>
